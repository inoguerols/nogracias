name: nogracias
on:
  schedule:
    - cron: "17 * * * *"   # cada hora (minuto 17, para no coincidir con el pico)
  workflow_dispatch: {}     # botón para lanzarlo a mano

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Mueve de verdad. Quita --apply para un dry-run en los logs.
      - run: python3 filter.py --apply
        env:
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          IMAP_FOLDER: ${{ secrets.IMAP_FOLDER }}
          # Capa IA opcional: si no defines el secret LLM_API_KEY, queda vacío -> solo reglas.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
